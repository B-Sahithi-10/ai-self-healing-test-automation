[pytest]
testpaths = tests
pythonpath = .
norecursedirs = .git .venv venv __pycache__ .ruff_cache .pytest_cache node_modules
addopts = -ra -q
markers =
    unit: fast, isolated tests (functions/modules only)
    integration: multiple internal components or disk/subprocess side effects
    e2e: full CLI / black-box runs
    slow: optional load or large-folder scenarios
    ollama: requires local Ollama (skipped in CI by default)
